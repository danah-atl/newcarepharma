<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Care Pharma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --o:#FEA101;--od:#E08E00;--ol:#FFF5E0;
  --b:#026AAB;--bd:#015588;--bl:#E3F1FA;
  --bg:#FAFBFC;--t:#1A1D2B;--tl:#6B7280;--w:#FFFFFF;
  --br:#E5E7EB;--sh:0 4px 30px rgba(2,106,171,.07);
  --shl:0 20px 60px rgba(2,106,171,.1);--r:16px;--rs:8px;
  --fd:'Playfair Display',Georgia,serif;--fb:'DM Sans',sans-serif;
  --tr:.4s cubic-bezier(.25,.46,.45,.94);
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);color:var(--t);background:var(--bg);line-height:1.7;overflow-x:hidden}
a{text-decoration:none;color:inherit}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.page{display:none}.page.active{display:block}

/* NAV */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--br);transition:var(--tr)}
.nb{display:flex;align-items:center;justify-content:space-between;height:72px}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer}
.logo img{height:48px}
.nl{display:flex;align-items:center;gap:4px;list-style:none}
.nl a,.nl span{font-size:.86rem;font-weight:500;padding:8px 13px;border-radius:8px;transition:var(--tr);cursor:pointer;display:inline-block}
.nl a:hover,.nl span:hover{background:var(--bl);color:var(--b)}
.dd{position:relative}
.dm{position:absolute;top:100%;left:0;min-width:200px;background:var(--w);border:1px solid var(--br);border-radius:var(--rs);box-shadow:var(--shl);padding:8px;opacity:0;visibility:hidden;transform:translateY(8px);transition:var(--tr);z-index:200}
.dd:hover .dm{opacity:1;visibility:visible;transform:translateY(0)}
.dm a{display:block;padding:10px 14px;border-radius:6px;font-size:.85rem}
.ncta{background:var(--o)!important;color:var(--w)!important;padding:10px 20px!important;border-radius:50px!important;font-weight:600!important}
.ncta:hover{background:var(--od)!important}
.lang-sw{display:flex;align-items:center;border:1px solid var(--br);border-radius:50px;overflow:hidden;margin-left:8px}
.lang-btn{padding:6px 12px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;background:transparent;transition:var(--tr);font-family:var(--fb);color:var(--tl)}
.lang-btn.active{background:var(--b);color:var(--w)}
.mt{display:none;background:none;border:none;cursor:pointer;width:40px;height:40px;flex-direction:column;justify-content:center;align-items:center;gap:5px}
.mt span{width:22px;height:2px;background:var(--t);border-radius:2px}
.mm{display:none;position:fixed;top:72px;left:0;right:0;background:var(--w);border-bottom:1px solid var(--br);padding:16px 24px;z-index:99;box-shadow:var(--shl);max-height:calc(100vh - 72px);overflow-y:auto}
.mm.open{display:flex;flex-direction:column;gap:6px}
.mm a{padding:12px 16px;border-radius:8px;font-weight:500;font-size:.95rem;cursor:pointer}
.mm a:hover{background:var(--bl);color:var(--b)}
.mm .lang-sw{margin:12px 0 0;align-self:flex-start}

/* BTNS */
.bp{display:inline-flex;align-items:center;gap:8px;padding:14px 30px;background:var(--b);color:var(--w);border:none;border-radius:50px;font-size:.93rem;font-weight:600;cursor:pointer;transition:var(--tr);font-family:var(--fb);box-shadow:0 4px 20px rgba(2,106,171,.3)}
.bp:hover{background:var(--bd);transform:translateY(-2px)}
.bo{display:inline-flex;align-items:center;gap:8px;padding:14px 30px;background:var(--o);color:var(--w);border:none;border-radius:50px;font-size:.93rem;font-weight:600;cursor:pointer;transition:var(--tr);font-family:var(--fb)}
.bo:hover{background:var(--od);transform:translateY(-2px)}
.bs{display:inline-flex;align-items:center;gap:8px;padding:14px 30px;background:var(--w);color:var(--t);border:1px solid var(--br);border-radius:50px;font-size:.93rem;font-weight:600;cursor:pointer;transition:var(--tr);font-family:var(--fb)}
.bs:hover{border-color:var(--b);color:var(--b);transform:translateY(-2px)}
.sl{font-family:var(--fb);font-weight:600;font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--o);margin-bottom:12px}
.st{font-family:var(--fd);font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--t);line-height:1.2;margin-bottom:16px}
.sd{font-size:1.05rem;color:var(--tl);max-width:560px;line-height:1.8}

/* PAGE HERO */
.ph{padding:120px 0 60px;position:relative;overflow:hidden}
.ph.phb{background:linear-gradient(135deg,var(--b),var(--bd))}
.ph.pho{background:linear-gradient(135deg,var(--o),var(--od))}
.ph .container{position:relative;z-index:1}
.ph h1{font-family:var(--fd);font-size:clamp(2rem,5vw,3.5rem);font-weight:700;color:white;margin-bottom:12px}
.ph p{color:rgba(255,255,255,.85);font-size:1.1rem;max-width:500px}
.ph .bc{margin-bottom:16px;font-size:.85rem;color:rgba(255,255,255,.6)}
.ph .bc a{color:rgba(255,255,255,.8);cursor:pointer}
.ph .bc a:hover{color:white}
.ph::after{content:'';position:absolute;top:-30%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);border-radius:50%}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding-top:72px;background:linear-gradient(135deg,var(--w) 0%,var(--bl) 40%,var(--ol) 100%)}
.hero::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(2,106,171,.08) 0%,transparent 70%);border-radius:50%}
.hi{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;z-index:1}
.hc{animation:fu 1s ease-out}
.hbg{display:inline-flex;align-items:center;gap:8px;background:var(--w);padding:6px 16px 6px 8px;border-radius:50px;font-size:.8rem;font-weight:600;color:var(--b);margin-bottom:24px;border:1px solid var(--br);box-shadow:var(--sh)}
.hbg .dot{width:8px;height:8px;background:var(--o);border-radius:50%;animation:pu 2s infinite}
.hero h1{font-family:var(--fd);font-size:clamp(2.5rem,5vw,3.8rem);font-weight:700;line-height:1.15;margin-bottom:20px}
.hero .cb{color:var(--b)}.hero .co{color:var(--o)}
.hero>div p{font-size:1.1rem;color:var(--tl);margin-bottom:36px;max-width:480px}
.hbt{display:flex;gap:16px;flex-wrap:wrap}
.hv{position:relative;display:flex;justify-content:center;align-items:center;animation:fu 1s ease-out .3s both}
.hiw{width:100%;max-width:500px;border-radius:32px;overflow:hidden;box-shadow:var(--shl)}
.hiw img{width:100%;display:block}
.hf{position:absolute;background:var(--w);border-radius:var(--r);padding:16px 20px;box-shadow:var(--shl);animation:fl 4s ease-in-out infinite;z-index:5}
.hf.f1{top:20px;right:-20px}.hf.f2{bottom:80px;left:-30px;animation-delay:1.5s}
.hf .fla{font-size:.7rem;color:var(--tl);text-transform:uppercase;letter-spacing:1px}
.hf .fv{font-size:1.3rem;font-weight:700;color:var(--b)}
.hf .fv.o{color:var(--o)}

/* STATS */
.sts{padding:60px 0;background:var(--w);border-top:3px solid var(--o);border-bottom:1px solid var(--br)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;text-align:center}
.si h3{font-family:var(--fd);font-size:2.5rem;font-weight:700;color:var(--b);margin-bottom:4px}
.si p{font-size:.9rem;color:var(--tl);font-weight:500}

/* ABOUT */
.abs{padding:100px 0}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.ai{position:relative;border-radius:24px;overflow:hidden;box-shadow:var(--shl)}
.ai img{width:100%;display:block}
.abg{position:absolute;bottom:20px;left:20px;background:var(--o);color:white;padding:10px 20px;border-radius:50px;font-weight:600;font-size:.85rem}
.afs{display:flex;flex-direction:column;gap:16px;margin-top:32px}
.af{display:flex;align-items:flex-start;gap:14px;padding:16px;background:var(--bg);border-radius:var(--rs);transition:var(--tr)}
.af:hover{background:var(--bl)}
.af .ic{width:40px;height:40px;min-width:40px;background:var(--b);color:white;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.af h4{font-size:.95rem;font-weight:600;margin-bottom:2px}
.af p{font-size:.85rem;color:var(--tl)}

/* CATEGORIES */
.cs{padding:100px 0;background:var(--w)}
.ch{text-align:center;margin-bottom:60px}
.ch .sd{margin:0 auto}
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.cc{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:3/4;cursor:pointer;transition:var(--tr)}
.cc:hover{transform:translateY(-6px);box-shadow:var(--shl)}
.cc img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:var(--tr)}
.cc:hover img{transform:scale(1.06)}
.co2{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(2,106,171,.85) 100%);z-index:1}
.cct{position:absolute;bottom:0;left:0;right:0;padding:24px;color:white;z-index:2}
.cct h3{font-family:var(--fd);font-size:1.15rem;font-weight:600}
.cic{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(254,161,1,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:.9rem;z-index:2;transition:var(--tr)}
.cc:hover .cic{background:var(--o);transform:scale(1.1)}

/* PRODUCTS */
.ps{padding:100px 0}
.psh{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:48px}
.pg{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.pc{background:var(--w);border-radius:var(--r);overflow:hidden;border:1px solid var(--br);transition:var(--tr);cursor:pointer}
.pc:hover{transform:translateY(-4px);box-shadow:var(--shl);border-color:var(--b)}
.pci{aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pci img{width:70%;height:70%;object-fit:contain;transition:var(--tr)}
.pc:hover .pci img{transform:scale(1.08)}
.ptg{position:absolute;top:12px;left:12px;background:var(--o);color:white;font-size:.7rem;padding:4px 10px;border-radius:50px;font-weight:600}
.pin{padding:20px;border-top:2px solid var(--o)}
.pin h4{font-size:.95rem;font-weight:600;margin-bottom:4px}
.pin p{font-size:.8rem;color:var(--tl)}

/* PRODUCT DETAIL */
.pds{padding:120px 0 80px}
.pdg{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.pdi{background:var(--w);border-radius:24px;padding:40px;display:flex;align-items:center;justify-content:center;border:1px solid var(--br);aspect-ratio:1}
.pdi img{max-width:80%;max-height:80%;object-fit:contain}
.pdh{font-family:var(--fd);font-size:2.2rem;font-weight:700;margin-bottom:8px}
.pdc{display:inline-block;background:var(--bl);color:var(--b);padding:4px 14px;border-radius:50px;font-size:.8rem;font-weight:600;margin-bottom:20px}
.pdd{font-size:1rem;color:var(--tl);line-height:1.9;margin-bottom:28px}
.pdf{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:32px}
.pft{background:var(--ol);color:var(--od);padding:8px 16px;border-radius:50px;font-size:.8rem;font-weight:600}
.pda{display:flex;gap:16px;flex-wrap:wrap}
.rs{padding:80px 0;background:var(--w)}
.rs .st{text-align:center;margin-bottom:40px}

/* CTA */
.cts{padding:100px 0;position:relative;overflow:hidden;background:linear-gradient(160deg,var(--b),var(--bd))}
.cts::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23fff' fill-opacity='.03'%3E%3Cpath d='m50 50-10-10 10-10 10 10zm-30 0L10 40l10-10 10 10z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.cti{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.ctx{color:white}
.ctx .sl{color:var(--o)}
.ctx h2{font-family:var(--fd);font-size:clamp(2rem,4vw,2.8rem);font-weight:700;margin-bottom:16px}
.ctx p{font-size:1.05rem;opacity:.85;margin-bottom:36px}
.ctimg{border-radius:24px;overflow:hidden;box-shadow:var(--shl)}
.ctimg img{width:100%;display:block}

/* CONTACT */
.cos{padding:100px 0;background:var(--w)}
.cog{display:grid;grid-template-columns:1fr 1fr;gap:60px}
.cf{display:flex;flex-direction:column;gap:16px}
.fg label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px}
.fg input,.fg textarea{width:100%;padding:14px 18px;border:1px solid var(--br);border-radius:var(--rs);font-family:var(--fb);font-size:.95rem;transition:var(--tr);background:var(--bg)}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--b);box-shadow:0 0 0 3px rgba(2,106,171,.1)}
.fg textarea{height:120px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cinfo{display:flex;flex-direction:column;gap:24px}
.ci{display:flex;align-items:flex-start;gap:16px;padding:20px;background:var(--bg);border-radius:var(--rs);border-left:3px solid var(--o)}
.ci .ic{width:44px;height:44px;min-width:44px;background:var(--bl);color:var(--b);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.ci h4{font-size:.9rem;font-weight:600;margin-bottom:4px}
.ci p{font-size:.85rem;color:var(--tl)}
.soc{display:flex;gap:12px;margin-top:16px}
.soc a{width:44px;height:44px;border-radius:12px;background:var(--b);color:white;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:var(--tr)}
.soc a:hover{background:var(--o);transform:translateY(-2px)}

/* NEWSLETTER */
.nls{padding:80px 0;background:var(--ol);text-align:center}
.nls h2{font-family:var(--fd);font-size:2rem;margin-bottom:12px}
.nls p{color:var(--tl);margin-bottom:28px}
.nlf{display:flex;gap:12px;max-width:460px;margin:0 auto}
.nlf input{flex:1;padding:14px 20px;border:1px solid var(--br);border-radius:50px;font-family:var(--fb);font-size:.95rem;background:var(--w)}
.nlf input:focus{outline:none;border-color:var(--o)}
.nlf button{padding:14px 28px;background:var(--b);color:white;border:none;border-radius:50px;font-weight:600;cursor:pointer;transition:var(--tr);font-family:var(--fb)}
.nlf button:hover{background:var(--bd)}

/* FOOTER */
.footer{padding:60px 0 30px;background:var(--t);color:rgba(255,255,255,.7)}
.ftg{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px}
.ftb p{margin-top:12px;font-size:.9rem;line-height:1.7}
.ftb img{height:50px;margin-bottom:8px}
.footer h4{color:var(--o);font-size:.9rem;font-weight:600;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.footer ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.footer ul a{color:rgba(255,255,255,.6);font-size:.85rem;transition:var(--tr);cursor:pointer}
.footer ul a:hover{color:var(--o)}
.fbt{border-top:1px solid rgba(255,255,255,.1);padding-top:24px;display:flex;justify-content:space-between;align-items:center;font-size:.8rem}
.fbt a{color:var(--o)}

/* ANIM */
@keyframes fu{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.fi{opacity:0;transform:translateY(30px);transition:opacity .8s ease,transform .8s ease}
.fi.visible{opacity:1;transform:translateY(0)}

/* RESPONSIVE */
@media(max-width:1024px){
  .hi{grid-template-columns:1fr;text-align:center}
  .hero>div p{margin:0 auto 36px}.hbt{justify-content:center}
  .hv{display:none}
  .ag,.pdg,.cti,.cog{grid-template-columns:1fr}
  .ctimg{display:none}
  .cg{grid-template-columns:repeat(3,1fr)}
  .pg{grid-template-columns:repeat(3,1fr)}
  .ftg{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  .nl{display:none}.mt{display:flex}
  .cg,.pg{grid-template-columns:repeat(2,1fr)}
  .sg{grid-template-columns:repeat(2,1fr);gap:24px}
  .psh{flex-direction:column;align-items:flex-start;gap:16px}
  .fr{grid-template-columns:1fr}
  .ftg{grid-template-columns:1fr}
  .nlf{flex-direction:column}
  .pdg{gap:30px}
}
@media(max-width:480px){
  .cg,.pg{grid-template-columns:1fr}
  .hbt{flex-direction:column;align-items:center}
}
</style>
</head>

// ═══ ROUTING ═══
let curPage='home',curParam='';
function go(page,param){
  curPage=page;curParam=param||'';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  window.scrollTo({top:0,behavior:'instant'});
  if(page==='home'){
    document.getElementById('page-home').classList.add('active');
    document.title='New Care Pharma';
  } else if(page==='about'){
    document.getElementById('page-about').classList.add('active');
    document.title=t('about')+' | New Care Pharma';
  } else if(page==='contact'){
    document.getElementById('page-contact').classList.add('active');
    document.title=t('contact')+' | New Care Pharma';
  } else if(page==='cat'){
    document.getElementById('page-category').classList.add('active');
    const isAll=param==='all';
    const title=isAll?t('allProducts'):cn(param);
    const desc=isAll?t('allDesc'):t('browseP');
    const filtered=isAll?prods:prods.filter(p=>p.cat===param);
    document.getElementById('page-category').innerHTML=`
      <div class="ph phb"><div class="container"><div class="bc"><a onclick="go('home')">${t('home')}</a> / ${title}</div>
        <h1>${title}</h1><p>${desc}</p></div></div>
      <section class="ps"><div class="container">
        ${filtered.length?`<div class="pg">${filtered.map(prodCard).join('')}</div>`
          :`<div style="text-align:center;padding:60px 0"><p style="font-size:1.2rem;color:var(--tl);margin-bottom:24px">${t('noProducts')}</p><a class="bp" onclick="go('cat','all')">${t('viewAll')}</a></div>`}
      </div></section>`;
    document.title=title+' | New Care Pharma';
  } else if(page==='product'){
    document.getElementById('page-product').classList.add('active');
    const p=prods.find(x=>x.id===param);if(!p)return;
    const related=prods.filter(x=>x.cat===p.cat&&x.id!==p.id).slice(0,4);
    document.getElementById('page-product').innerHTML=`
      <section class="pds"><div class="container">
        <div class="bc" style="margin-bottom:24px;font-size:.85rem;color:var(--tl)">
          <a onclick="go('home')" style="color:var(--b);cursor:pointer">${t('home')}</a> /
          <a onclick="go('cat','${p.cat}')" style="color:var(--b);cursor:pointer">${cn(p.cat)}</a> /
          <span>${pn(p)}</span></div>
        <div class="pdg">
          <div class="pdi fi"><img src="${p.img}" alt="${pn(p)}"></div>
          <div class="fi"><h1 class="pdh">${pn(p)}</h1>
            <span class="pdc">${cn(p.cat)}</span>
            <div class="pdd"><p>${pd(p)}</p></div>
            <div class="pdf">${pf(p).map(f=>`<span class="pft">${f}</span>`).join('')}</div>
            <div class="pda"><a class="bo" onclick="go('contact')">${t('contactPricing')} →</a>
              <a class="bs" onclick="go('cat','${p.cat}')">← ${t('backCat')}</a></div>
          </div>
        </div>
      </div></section>
      ${related.length?`<section class="rs"><div class="container"><h2 class="st">${t('relatedProducts')}</h2><div class="pg">${related.map(prodCard).join('')}</div></div></section>`:''}`;
    document.title=pn(p)+' | New Care Pharma';
  }
  setTimeout(()=>{document.querySelectorAll('.fi:not(.visible)').forEach(el=>obs.observe(el))},50);
}
function closeMob(){document.getElementById('mm').classList.remove('open')}
function setLang(l){lang=l;document.documentElement.lang=l;renderAll();go(curPage,curParam)}

// ═══ INIT ═══
const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')})},{threshold:.1});
renderAll();
document.querySelectorAll('.fi').forEach(el=>obs.observe(el));
window.addEventListener('scroll',()=>{document.querySelector('.navbar').style.boxShadow=window.scrollY>50?'0 4px 30px rgba(0,0,0,.08)':'none'});
</script>
